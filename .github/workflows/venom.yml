name: Build Venom APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build
        run: |
          pip install buildozer cython==0.29.33
          sudo apt-get install -y zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          yes | buildozer -v android debug
      - name: Upload
        uses: actions/upload-artifact@v2
        with:
          name: Venom-App
          path: bin/*.apk
